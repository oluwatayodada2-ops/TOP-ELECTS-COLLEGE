<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP-ELECTS COLLEGE - Result Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            font-style: italic;
        }

        .nav {
            background: #f8f9fa;
            padding: 15px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .nav button:hover {
            background: #2a5298;
            transform: translateY(-2px);
        }

        .nav .logout-btn {
            background: #dc3545;
            margin-left: auto;
        }

        .nav .logout-btn:hover {
            background: #c82333;
        }

        .main-content {
            padding: 30px;
            min-height: 500px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #1e3c72;
        }

        button {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #2a5298;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            overflow-x: auto;
            display: block;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #1e3c72;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card h3 {
            margin-bottom: 15px;
            color: #1e3c72;
            border-left: 4px solid #1e3c72;
            padding-left: 10px;
        }

        .grid-2, .grid-3, .grid-4 {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        .grid-2 { grid-template-columns: repeat(2, 1fr); }
        .grid-3 { grid-template-columns: repeat(3, 1fr); }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .login-box {
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1e3c72;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: bold;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .badge-info { background: #d1ecf1; color: #0c5460; }

        .status-approved {
            color: green;
            font-weight: bold;
        }

        .status-pending {
            color: orange;
            font-weight: bold;
        }

        .status-rejected {
            color: red;
            font-weight: bold;
        }

        .fee-paid {
            color: green;
            font-weight: bold;
        }

        .fee-unpaid {
            color: red;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 {
                grid-template-columns: 1fr;
            }
            .nav button {
                font-size: 12px;
                padding: 8px 12px;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>🏫 TOP-ELECTS COLLEGE</h1>
        <p>Result Portal</p>
    </div>
    <div id="content"></div>
</div>

<script>
    // ==================== DATA STRUCTURES ====================
    let schoolData = {
        classes: [
            { id: 'class1', name: 'SSS 1', arms: ['Science', 'Humanities', 'Business'] },
            { id: 'class2', name: 'SSS 2', arms: ['Science', 'Humanities', 'Business'] },
            { id: 'class3', name: 'SSS 3', arms: ['Science', 'Humanities', 'Business'] },
            { id: 'class4', name: 'JSS 1', arms: ['A', 'B', 'C'] },
            { id: 'class5', name: 'JSS 2', arms: ['A', 'B', 'C'] },
            { id: 'class6', name: 'JSS 3', arms: ['A', 'B', 'C'] }
        ],
        subjects: [
            { id: 'subj1', name: 'Mathematics', code: 'MTH101', category: 'Core' },
            { id: 'subj2', name: 'English Language', code: 'ENG101', category: 'Core' },
            { id: 'subj3', name: 'Physics', code: 'PHY101', category: 'Science' },
            { id: 'subj4', name: 'Chemistry', code: 'CHM101', category: 'Science' },
            { id: 'subj5', name: 'Biology', code: 'BIO101', category: 'Science' },
            { id: 'subj6', name: 'Economics', code: 'ECO101', category: 'Commercial' },
            { id: 'subj7', name: 'Accounting', code: 'ACC101', category: 'Commercial' },
            { id: 'subj8', name: 'Commerce', code: 'COM101', category: 'Commercial' },
            { id: 'subj9', name: 'Government', code: 'GOV101', category: 'Arts' },
            { id: 'subj10', name: 'Literature', code: 'LIT101', category: 'Arts' },
            { id: 'subj11', name: 'CRS', code: 'CRS101', category: 'Core' },
            { id: 'subj12', name: 'Computer Science', code: 'CSC101', category: 'Elective' }
        ]
    };

    // FORCE RESET AND CREATE ADMIN - FIXED VERSION
    function initData() {
        // Clear any existing problematic data
        localStorage.removeItem('users');
        localStorage.removeItem('currentUser');
        
        // Create fresh school data
        localStorage.setItem('schoolData', JSON.stringify(schoolData));
        
        // Create admin user with EXPLICIT credentials
        const adminUser = { 
            id: 'admin1', 
            username: 'admin', 
            password: 'admin123', 
            role: 'admin', 
            name: 'System Administrator', 
            email: 'admin@topelects.edu.ng' 
        };
        localStorage.setItem('users', JSON.stringify([adminUser]));
        
        // Initialize other storage
        if (!localStorage.getItem('teachers')) {
            localStorage.setItem('teachers', JSON.stringify([]));
        }
        if (!localStorage.getItem('students')) {
            localStorage.setItem('students', JSON.stringify([]));
        }
        if (!localStorage.getItem('teacherSubjects')) {
            localStorage.setItem('teacherSubjects', JSON.stringify([]));
        }
        if (!localStorage.getItem('results')) {
            localStorage.setItem('results', JSON.stringify([]));
        }
        if (!localStorage.getItem('sessions')) {
            localStorage.setItem('sessions', JSON.stringify([{ id: 'sess1', academicYear: '2024/2025', term: 'First Term', isActive: true }]));
        }
        
        console.log('Admin user created:', adminUser);
        console.log('Users in localStorage:', JSON.parse(localStorage.getItem('users')));
    }

    function getCurrentUser() {
        return JSON.parse(localStorage.getItem('currentUser'));
    }

    function setCurrentUser(user) {
        localStorage.setItem('currentUser', JSON.stringify(user));
    }

    function logout() {
        localStorage.removeItem('currentUser');
        render();
    }

    // Helper functions
    function getTeachers() {
        return JSON.parse(localStorage.getItem('teachers')) || [];
    }

    function getStudents() {
        return JSON.parse(localStorage.getItem('students')) || [];
    }

    function getResults() {
        return JSON.parse(localStorage.getItem('results')) || [];
    }

    function getTeacherSubjects() {
        return JSON.parse(localStorage.getItem('teacherSubjects')) || [];
    }

    function getSubjects() {
        return JSON.parse(localStorage.getItem('schoolData')).subjects;
    }

    function getClasses() {
        return JSON.parse(localStorage.getItem('schoolData')).classes;
    }

    // ==================== RENDER FUNCTIONS ====================
    function render() {
        const currentUser = getCurrentUser();
        if (!currentUser) {
            renderLogin();
        } else if (currentUser.role === 'admin') {
            renderAdminDashboard();
        } else if (currentUser.role === 'teacher') {
            renderTeacherDashboard();
        } else if (currentUser.role === 'student') {
            renderStudentDashboard();
        }
    }

    function renderLogin() {
        const content = `
            <div class="login-box">
                <h2>🔐 Result Portal Login</h2>
                <div id="loginAlert"></div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter password">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="loginRole">
                        <option value="admin">Admin</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student/Parent</option>
                    </select>
                </div>
                <button onclick="handleLogin()" style="width: 100%">Login</button>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
    }

    function renderAdminDashboard() {
        const teachers = getTeachers();
        const students = getStudents();
        const results = getResults();
        const pendingResults = results.filter(r => r.status === 'pending');
        const studentsWithoutAccess = students.filter(s => s.canViewResults === false);
        
        const content = `
            <div class="nav">
                <button onclick="showAdminSection('dashboard')">📊 Dashboard</button>
                <button onclick="showAdminSection('subjects')">📚 Subjects</button>
                <button onclick="showAdminSection('teachers')">👨‍🏫 Teachers</button>
                <button onclick="showAdminSection('teacherSubjects')">📋 Assign Subjects</button>
                <button onclick="showAdminSection('students')">👨‍🎓 Students</button>
                <button onclick="showAdminSection('feeManagement')">💰 Fee Management</button>
                <button onclick="showAdminSection('resultApproval')">✅ Result Approval</button>
                <button onclick="showAdminSection('classes')">🏫 Classes & Arms</button>
                <button onclick="showAdminSection('sessions')">📅 Sessions</button>
                <button onclick="showAdminSection('allResults')">📖 All Results</button>
                <button onclick="showAdminSection('reports')">📊 Reports</button>
                <button class="logout-btn" onclick="logout()">🚪 Logout</button>
            </div>
            <div class="main-content" id="adminContent">
                <div class="stats">
                    <div class="stat-card"><h3>${teachers.length}</h3><p>Teachers</p></div>
                    <div class="stat-card"><h3>${students.length}</h3><p>Students</p></div>
                    <div class="stat-card"><h3>${pendingResults.length}</h3><p>Pending Approval</p></div>
                    <div class="stat-card"><h3>${studentsWithoutAccess.length}</h3><p>Fee Defaulters</p></div>
                </div>
                <div class="card">
                    <h3>📈 Quick Actions</h3>
                    <button onclick="showAdminSection('resultApproval')">✅ Approve Pending Results (${pendingResults.length})</button>
                    <button onclick="showAdminSection('feeManagement')">💰 Manage Student Fees</button>
                </div>
            </div>
        `;
        document.getElementById('content').innerHTML = content;
        showAdminSection('dashboard');
    }

    window.showAdminSection = function(section) {
        let html = '';
        
        if (section === 'dashboard') {
            const teachers = getTeachers();
            const students = getStudents();
            const results = getResults();
            const pendingResults = results.filter(r => r.status === 'pending');
            html = `
                <div class="stats">
                    <div class="stat-card"><h3>${teachers.length}</h3><p>Total Teachers</p></div>
                    <div class="stat-card"><h3>${students.length}</h3><p>Total Students</p></div>
                    <div class="stat-card"><h3>${results.length}</h3><p>Total Results</p></div>
                    <div class="stat-card"><h3>${pendingResults.length}</h3><p>Awaiting Approval</p></div>
                </div>
                <div class="card">
                    <h3>📈 Recent Activity</h3>
                    <p>Latest results awaiting approval:</p>
                    <table>
                        <thead><tr><th>Student</th><th>Subject</th><th>Total</th><th>Status</th></tr></thead>
                        <tbody>
                            ${pendingResults.slice(-5).map(r => `<tr><td>${r.studentName}</td><td>${r.subject}</td><td>${r.total}</td><td class="status-pending">Pending</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        else if (section === 'feeManagement') {
            const students = getStudents();
            html = `
                <div class="card">
                    <h3>💰 Student Fee Management</h3>
                    <p>Toggle access to allow or disallow students from viewing results based on fee payment status.</p>
                    <table>
                        <thead>
                            <tr>
                                <th>Admission No</th>
                                <th>Student Name</th>
                                <th>Class</th>
                                <th>Fee Status</th>
                                <th>Result Access</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${students.map(s => `
                                <tr>
                                    <td>${s.admissionNo}</td>
                                    <td>${s.name}</td>
                                    <td>${s.class}</td>
                                    <td class="${s.feeStatus === 'paid' ? 'fee-paid' : 'fee-unpaid'}">${s.feeStatus === 'paid' ? '✅ Paid' : '❌ Unpaid'}</td>
                                    <td>${s.canViewResults ? '<span class="badge-success">Can View</span>' : '<span class="badge-danger">Blocked</span>'}</td>
                                    <td>
                                        <button onclick="toggleFeeStatus('${s.id}')">${s.feeStatus === 'paid' ? 'Mark as Unpaid' : 'Mark as Paid'}</button>
                                        <button onclick="toggleResultAccess('${s.id}')" style="margin-left: 5px; background: ${s.canViewResults ? '#dc3545' : '#28a745'}">${s.canViewResults ? 'Block Access' : 'Allow Access'}</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        else if (section === 'resultApproval') {
            const results = getResults();
            const pendingResults = results.filter(r => r.status === 'pending');
            
            html = `
                <div class="card">
                    <h3>✅ Pending Results Approval (${pendingResults.length})</h3>
                    ${pendingResults.length === 0 ? '<p>No pending results to approve.</p>' : `
                        <table>
                            <thead>
                                <tr>
                                    <th>Student</th><th>Subject</th><th>Class</th><th>Term</th>
                                    <th>CA</th><th>Exam</th><th>Total</th><th>Grade</th>
                                    <th>Teacher</th><th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${pendingResults.map(r => `
                                    <tr>
                                        <td>${r.studentName}</td>
                                        <td>${r.subject}</td>
                                        <td>${r.class}</td>
                                        <td>${r.term}</td>
                                        <td>${r.caScore}</td>
                                        <td>${r.examScore}</td>
                                        <td><strong>${r.total}</strong></td>
                                        <td><strong>${r.grade}</strong></td>
                                        <td>${r.teacher}</td>
                                        <td>
                                            <button onclick="approveResult('${r.id}')" style="background: #28a745">✅ Approve</button>
                                            <button onclick="rejectResult('${r.id}')" style="background: #dc3545; margin-left: 5px">❌ Reject</button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `}
                </div>
            `;
        }
        else if (section === 'subjects') {
            const subjects = getSubjects();
            html = `
                <div class="card">
                    <h3>➕ Add New Subject</h3>
                    <div class="grid-2">
                        <div><input type="text" id="subjectName" placeholder="Subject Name"></div>
                        <div><input type="text" id="subjectCode" placeholder="Subject Code"></div>
                        <div><select id="subjectCategory">
                            <option value="Core">Core Subject</option>
                            <option value="Science">Science</option>
                            <option value="Commercial">Commercial</option>
                            <option value="Arts">Arts</option>
                            <option value="Elective">Elective</option>
                        </select></div>
                    </div>
                    <button onclick="addSubject()">➕ Add Subject</button>
                </div>
                <div class="card">
                    <h3>📚 All Subjects</h3>
                    <table>
                        <thead><tr><th>Code</th><th>Subject Name</th><th>Category</th><th>Action</th></tr></thead>
                        <tbody>
                            ${subjects.map(s => `<tr><td>${s.code}</td><td>${s.name}</td><td>${s.category}</td><td><button onclick="deleteSubject('${s.id}')">Delete</button></td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        else if (section === 'teachers') {
            const teachers = getTeachers();
            html = `
                <div class="card">
                    <h3>➕ Add New Teacher</h3>
                    <div class="grid-3">
                        <div><input type="text" id="teacherName" placeholder="Full Name"></div>
                        <div><input type="text" id="teacherUsername" placeholder="Username"></div>
                        <div><input type="password" id="teacherPassword" placeholder="Password"></div>
                        <div><input type="email" id="teacherEmail" placeholder="Email"></div>
                        <div><input type="text" id="teacherPhone" placeholder="Phone Number"></div>
                        <div><select id="teacherQualification">
                            <option value="">Qualification</option>
                            <option>B.Sc Education</option>
                            <option>M.Ed</option>
                            <option>PGDE</option>
                            <option>NCE</option>
                        </select></div>
                    </div>
                    <button onclick="addTeacher()">➕ Add Teacher</button>
                </div>
                <div class="card">
                    <h3>👨‍🏫 All Teachers</h3>
                    <table>
                        <thead><tr><th>Name</th><th>Username</th><th>Email</th><th>Phone</th><th>Action</th></tr></thead>
                        <tbody>
                            ${teachers.map(t => `<tr><td>${t.name}</td><td>${t.username}</td><td>${t.email || '-'}</td><td>${t.phone || '-'}</td><td><button onclick="deleteTeacher('${t.id}')">Delete</button></td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        else if (section === 'teacherSubjects') {
            const teachers = getTeachers();
            const subjects = getSubjects();
            const classes = getClasses();
            const teacherSubjects = getTeacherSubjects();
            
            html = `
                <div class="card">
                    <h3>📋 Assign Subject to Teacher</h3>
                    <div class="grid-3">
                        <div><select id="assignTeacherId">
                            <option value="">Select Teacher</option>
                            ${teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('')}
                        </select></div>
                        <div><select id="assignSubjectId">
                            <option value="">Select Subject</option>
                            ${subjects.map(s => `<option value="${s.id}">${s.name} (${s.code})</option>`).join('')}
                        </select></div>
                        <div><select id="assignClass">
                            <option value="">Select Class & Arm</option>
                            ${classes.map(c => c.arms.map(arm => `<option value="${c.name} ${arm}">${c.name} ${arm}</option>`).join('')).join('')}
                        </select></div>
                    </div>
                    <button onclick="assignSubjectToTeacher()">Assign Subject</button>
                </div>
                <div class="card">
                    <h3>📋 Current Teacher Subject Assignments</h3>
                    <table>
                        <thead><tr><th>Teacher</th><th>Subject</th><th>Class</th><th>Action</th></tr></thead>
                        <tbody>
                            ${teacherSubjects.map(ts => {
                                const teacher = teachers.find(t => t.id === ts.teacherId);
                                const subject = subjects.find(s => s.id === ts.subjectId);
                                return `<tr><td>${teacher?.name || 'Unknown'}</td><td>${subject?.name || 'Unknown'}</td><td>${ts.class}</td><td><button onclick="removeTeacherSubject('${ts.id}')">Remove</button></td></tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }
        else if (section === 'students') {
            const students = getStudents();
            const classes = getClasses();
            html = `
                <div class="card">
                    <h3>➕ Add New Student</h3>
                    <div class="grid-3">
                        <div><input type="text" id="studentName" placeholder="Full Name"></div>
                        <div><input type="text" id="studentAdmNo" placeholder="Admission Number"></div>
                        <div><select id="studentClass">
                            <option value="">Select Class & Arm</option>
                            ${classes.map(c => c.arms.map(arm => `<option value="${c.name} ${arm}">${c.name} ${arm}</option>`).join('')).join('')}
                        </select></div>
                        <div><input type="email" id="studentParentEmail" placeholder="Parent Email"></div>
                        <div><input type="text" id="studentParentPhone" placeholder="Parent Phone"></div>
                        <div><input type="text" id="studentUsername" placeholder="Username"></div>
                        <div><input type="password" id="studentPassword" placeholder="Password"></div>
                        <div><input type="text" id="studentAddress" placeholder="Address"></div>
                    </div>
                    <button onclick="addStudent()">➕ Add Student</button>
                </div>
                <div class="card">
                    <h3>👨‍🎓 All Students</h3>

                    </div>
                </div>
            `;
        }
        else if (section === 'analytics') {
            const totalScore = myResults.reduce((sum, r) => sum + r.total, 0);

            const gradeMap = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0 };
            myResults.forEach(r => gradeMap[r.grade]++);
            
            html = `
                <div class="stats">
                    <div class="stat-card"><h3>${myResults.length}</h3><p>Subjects</p></div>
                    <div class="stat-card"><h3>${average}</h3><p>Average Score</p></div>

                                    </tr>

                    </table>
                </div>
            `;
        }
        
        document.getElementById('studentContent').innerHTML = html;

    window.handleLogin = function() {
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;
        const role = document.getElementById('loginRole').value;
        
        const alertDiv = document.getElementById('loginAlert');
        
        // Get users from localStorage
        const users = JSON.parse(localStorage.getItem('users')) || [];
        
        // Debug: Log what's in localStorage
        console.log('All users:', users);
        console.log('Login attempt - Username:', username, 'Password:', password, 'Role:', role);
        
        // Find user matching credentials
        const user = users.find(u => u.username === username && u.password === password && u.role === role);
        
        if (user) {
            console.log('User found:', user);
            setCurrentUser(user);
            render();
        } else {
            console.log('No user found with these credentials');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-error">❌ Invalid credentials</div>';
        }
    };

        const teacherSubjectId = document.getElementById('inputSubject').value;
        const studentId = document.getElementById('inputStudentId').value;
        const caScore = parseInt(document.getElementById('caScore').value);
        const examScore = parseInt(document.getElementById('examScore').value);
        
        if (!teacherSubjectId || !studentId || isNaN(caScore) || isNaN(examScore)) {
            alert('Please fill all fields');
            return;
        }
        
        if (caScore < 0 || caScore > 40 || examScore < 0 || examScore > 60) {
            alert('CA Score must be 0-40 and Exam Score 0-60');
            return;
        }
        
        const total = caScore + examScore;
        let grade = 'F';
        if (total >= 75) grade = 'A';
        else if (total >= 65) grade = 'B';
        else if (total >= 50) grade = 'C';
        else if (total >= 45) grade = 'D';
        else if (total >= 40) grade = 'E';
        
        const teacherSubjects = getTeacherSubjects();
        const assignment = teacherSubjects.find(ts => ts.id === teacherSubjectId);
        const subjects = getSubjects();
        const subject = subjects.find(s => s.id === assignment.subjectId);
        const students = getStudents();
        const student = students.find(s => s.id === studentId);
        const currentUser = getCurrentUser();
        const sessions = JSON.parse(localStorage.getItem('sessions'));
        const activeSession = sessions.find(s => s.isActive);
        const term = activeSession ? `${activeSession.term} ${activeSession.academicYear}` : 'Current Term';
        
        const results = getResults();
        const existing = results.find(r => r.studentId === studentId && r.subject === subject.name && r.term === term);
        
        if (existing) {
            if (confirm('Result already exists for this subject this term. Overwrite?')) {
                existing.caScore = caScore;
                existing.examScore = examScore;
                existing.total = total;
                existing.grade = grade;
                existing.status = 'pending';
                existing.date = new Date().toISOString();
                localStorage.setItem('results', JSON.stringify(results));
                alert(`Result updated and submitted for approval! Total: ${total}, Grade: ${grade}`);
            }
        } else {
            const newResult = {
                id: 'res_' + Date.now(),
                studentId, studentName: student.name, admissionNo: student.admissionNo,
                subject: subject.name, class: student.class, term,
                caScore, examScore, total, grade,
                teacher: currentUser.name, teacherId: currentUser.id,
                status: 'pending',
                date: new Date().toISOString()
            };
            results.push(newResult);
            localStorage.setItem('results', JSON.stringify(results));
            alert(`Result submitted for admin approval! Total: ${total}, Grade: ${grade}`);
        }
        
        document.getElementById('caScore').value = '';
        document.getElementById('examScore').value = '';
    };

    window.approveResult = function(resultId) {
        if (confirm('Approve this result? Student will be able to view it.')) {
            const results = getResults();
            const result = results.find(r => r.id === resultId);
            if (result) {
                result.status = 'approved';
                result.approvedBy = getCurrentUser().name;
                result.approvedDate = new Date().toISOString();
                localStorage.setItem('results', JSON.stringify(results));
                alert('Result approved successfully!');
                showAdminSection('resultApproval');
            }
        }
    };

    window.rejectResult = function(resultId) {
        if (confirm('Reject this result? Student will not see it.')) {
            const results = getResults();
            const result = results.find(r => r.id === resultId);
            if (result) {
                result.status = 'rejected';
                result.rejectedBy = getCurrentUser().name;
                result.rejectedDate = new Date().toISOString();
                localStorage.setItem('results', JSON.stringify(results));
                alert('Result rejected.');
                showAdminSection('resultApproval');
            }
        }
    };

    window.toggleFeeStatus = function(studentId) {
        const students = getStudents();
        const student = students.find(s => s.id === studentId);
        if (student) {
            student.feeStatus = student.feeStatus === 'paid' ? 'unpaid' : 'paid';
            localStorage.setItem('students', JSON.stringify(students));
            showAdminSection('feeManagement');
        }
    };

    window.toggleResultAccess = function(studentId) {
        const students = getStudents();
        const student = students.find(s => s.id === studentId);
        if (student) {
            student.canViewResults = !student.canViewResults;
            localStorage.setItem('students', JSON.stringify(students));
            showAdminSection('feeManagement');
        }
    };

    window.loadStudentsForSubject = function() {
        const teacherSubjectId = document.getElementById('inputSubject').value;
        const teacherSubjects = getTeacherSubjects();
        const assignment = teacherSubjects.find(ts => ts.id === teacherSubjectId);
        
        if (assignment) {
            const students = getStudents();
            const classStudents = students.filter(s => s.class === assignment.class);
            const studentSelect = document.getElementById('inputStudentId');
            studentSelect.innerHTML = '<option value="">Select Student</option>' + 
                classStudents.map(s => `<option value="${s.id}">${s.name} (${s.admissionNo})</option>`).join('');
        }
    };

    window.viewClassStudents = function(className, subjectName) {
        const students = getStudents();
        const classStudents = students.filter(s => s.class === className);
        alert(`Students in ${className} for ${subjectName}:\n${classStudents.map(s => s.name).join('\n')}`);
    };

    window.addClass = function() {
        const className = document.getElementById('className').value;
        const armsInput = document.getElementById('classArms').value;
        
        if (!className || !armsInput) {
            alert('Please fill class name and arms');
            return;
        }
        
        const arms = armsInput.split(',').map(a => a.trim());
        const data = JSON.parse(localStorage.getItem('schoolData'));
        const newClass = { id: 'class_' + Date.now(), name: className, arms };
        data.classes.push(newClass);
        localStorage.setItem('schoolData', JSON.stringify(data));
        alert('Class added successfully!');
        showAdminSection('classes');
    };

    window.deleteClass = function(classId) {
        if (confirm('Delete this class? All related data may be affected.')) {
            const data = JSON.parse(localStorage.getItem('schoolData'));
            data.classes = data.classes.filter(c => c.id !== classId);
            localStorage.setItem('schoolData', JSON.stringify(data));
            showAdminSection('classes');
        }
    };

    window.addArmToClass = function(classId) {
        const armName = prompt('Enter arm name (e.g., Science, Arts, Business):');
        if (armName) {
            const data = JSON.parse(localStorage.getItem('schoolData'));
            const classObj = data.classes.find(c => c.id === classId);
            if (classObj && !classObj.arms.includes(armName)) {
                classObj.arms.push(armName);
                localStorage.setItem('schoolData', JSON.stringify(data));
                showAdminSection('classes');
            } else {
                alert('Arm already exists or class not found');
            }
        }
    };

    window.setActiveSession = function() {
        const academicYear = document.getElementById('academicYear').value;
        const term = document.getElementById('termSelect').value;
        
        if (!academicYear) {
            alert('Please enter academic year');
            return;
        }
        
        let sessions = JSON.parse(localStorage.getItem('sessions'));
        sessions.forEach(s => s.isActive = false);
        
        const newSession = { id: 'sess_' + Date.now(), academicYear, term, isActive: true };
        sessions.push(newSession);
        localStorage.setItem('sessions', JSON.stringify(sessions));
        alert('Session activated successfully!');
        showAdminSection('sessions');
    };

    window.searchResults = function() {
        const searchTerm = document.getElementById('searchResult').value.toLowerCase();
        const results = getResults();
        const filtered = results.filter(r => 
            r.studentName.toLowerCase().includes(searchTerm) || 
            r.subject.toLowerCase().includes(searchTerm)
        );
        
        const tableBody = document.querySelector('#resultsTable tbody');
        if (tableBody) {
            tableBody.innerHTML = filtered.map(r => `
                <tr>
                    <td>${r.studentName}</td>
                    <td>${r.admissionNo || '-'}</td>
                    <td>${r.subject}</td>
                    <td>${r.class}</td>
                    <td>${r.term}</td>
                    <td>${r.caScore}</td>
                    <td>${r.examScore}</td>
                    <td><strong>${r.total}</strong></td>
                    <td><strong>${r.grade}</strong></td>
                    <td class="${r.status === 'approved' ? 'status-approved' : r.status === 'pending' ? 'status-pending' : 'status-rejected'}">${r.status || 'pending'}</td>
                    <td>${r.teacher}</td>
                </tr>
            `).join('');
        }
    };

    // Initialize and render - FORCE CLEAR AND RESET
    initData();
    render();
    
    // Extra debug info in console
    console.log('Page loaded. Admin credentials: username="admin", password="admin123"');
</script>
</body>
